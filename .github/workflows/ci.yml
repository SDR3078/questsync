name: ci

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements-dev.txt
      - run: PYTHONPATH=src python -m pytest -q

  publish:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write      # write the image-tag bump back to the manifest (GitOps)
      packages: write      # push to GHCR with the built-in GITHUB_TOKEN
      id-token: write       # provenance/SBOM attestations
      attestations: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      # For arm64 too, add docker/setup-qemu-action@v3 and set
      # `platforms: linux/amd64,linux/arm64` on the build step below.

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'   # forks/PRs get a read-only token
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/sdr3078/questsync
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short
            type=semver,pattern={{version}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}   # build-only on PRs
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

      # GitOps write-back: point the manifest at the image we just built and
      # commit it, so ArgoCD rolls the new pod. GITHUB_TOKEN pushes don't
      # re-trigger CI (and [skip ci] belt-and-suspenders), so there's no loop.
      - name: Roll deployed image tag
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          TAG=$(printf '%s\n' "${{ steps.meta.outputs.tags }}" | grep -oE 'sha-[0-9a-f]+' | head -1)
          [ -n "$TAG" ] || { echo "no sha- tag in metadata outputs"; exit 1; }
          sed -i -E "s#(image: ghcr.io/sdr3078/questsync:)sha-[0-9a-f]+#\1${TAG}#" deploy/k8s/deployment.yaml
          if git diff --quiet -- deploy/k8s/deployment.yaml; then
            echo "deployment already pinned to ${TAG}; nothing to roll"; exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "deploy: roll image to ${TAG} [skip ci]" -- deploy/k8s/deployment.yaml
          git push origin HEAD:main
