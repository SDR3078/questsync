# Example ONLY. Never commit real credentials. Seal this with kubeseal, then
# commit the resulting SealedSecret instead:
#   kubectl create secret generic questsync-habitica \
#     --from-literal=HABITICA_USER_ID=xxxx \
#     --from-literal=HABITICA_API_TOKEN=xxxx \
#     --dry-run=client -o yaml | kubeseal -o yaml > deploy/k8s/sealedsecret.yaml
apiVersion: v1
kind: Secret
metadata:
  name: questsync-habitica
type: Opaque
stringData:
  HABITICA_USER_ID: "REPLACE_ME"
  HABITICA_API_TOKEN: "REPLACE_ME"
