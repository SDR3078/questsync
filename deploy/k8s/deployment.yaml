apiVersion: apps/v1
kind: Deployment
metadata:
  name: questsync
  labels:
    app: questsync
spec:
  replicas: 1
  selector:
    matchLabels:
      app: questsync
  template:
    metadata:
      labels:
        app: questsync
    spec:
      # This CalDAV facade never calls the Kubernetes API — don't hand it a token.
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault        # required by PodSecurity 'restricted'
      containers:
        - name: questsync
          # Pinned to an immutable CI tag (docker/metadata type=sha); bump on release
          # so ArgoCD detects the change. Never :latest — it drifts with no audit trail.
          image: ghcr.io/sdr3078/questsync:sha-fa71404
          imagePullPolicy: IfNotPresent
          ports:
            - name: caldav
              containerPort: 5232
          # Multi-user: NO server-side Habitica creds — each user authenticates
          # with their own Habitica User ID + API token as DAV credentials.
          env:
            - name: QUESTSYNC_TASK_TYPES
              value: "todos,dailys"
            - name: QUESTSYNC_CACHE_TTL
              value: "30"
          readinessProbe:
            httpGet: { path: /.web/, port: caldav }
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
          livenessProbe:
            httpGet: { path: /.web/, port: caldav }
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 3
          resources:
            requests: { cpu: 25m, memory: 64Mi }
            limits: { cpu: 200m, memory: 128Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        # Radicale's backend is filesystem-free (a live Habitica facade), so the only
        # writable path needed under the read-only rootfs is /tmp for transient work.
        - name: tmp
          emptyDir: {}
