# QuestSync enforces per-user auth (Habitica creds validated live). TLS is
# MANDATORY here: credentials travel in HTTP Basic auth on every request, so
# never serve this over plain HTTP. Set your real host below; cert-manager
# issues the certificate. Kept out of kustomization.yaml so you opt in on
# purpose after setting the hostname.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: questsync
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  tls:
    - hosts: ["questsync.example.com"]
      secretName: questsync-tls
  rules:
    - host: questsync.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: questsync
                port:
                  number: 5232
