apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# QuestSync is stateless and needs no app secret (each user brings their own Habitica
# creds). ingress.yaml is a template — set your host/TLS and add it here, or route HTTPS
# to the Service another way (see README.md).
resources:
  - deployment.yaml
  - service.yaml
  - networkpolicy.yaml
